<!-- index.html -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Verification App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Welcome Screen -->
  <div class="container" id="welcomeScreen">
    <h1>Verification App</h1>
    <p>Enter your credentials to continue</p>
    <form id="credentialsForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required>
      </div>
      <button type="submit" class="btn">Continue</button>
    </form>
  </div>

  <!-- Verification Screen -->
  <div class="container hidden" id="verificationScreen">
    <h1>Enter Verification Code</h1>
    <p>A verification code has been sent to your device</p>
    <div class="form-group">
      <input type="text" id="verificationCode" maxlength="6" placeholder="000000">
    </div>
    <button id="verifyButton" class="btn">Verify</button>
    <p id="verificationStatus"></p>
  </div>

  <!-- Result Screen -->
  <div class="container hidden" id="resultScreen">
    <div id="successResult" class="hidden">
      <h1>Verification Successful!</h1>
      <div class="success-checkmark">✓</div>
      <p>Your identity has been verified.</p>
    </div>
    <div id="failureResult" class="hidden">
      <h1>Verification Failed</h1>
      <div class="failure-x">✗</div>
      <p>The verification code is incorrect.</p>
    </div>
    <button id="returnButton" class="btn">Return to Start</button>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
